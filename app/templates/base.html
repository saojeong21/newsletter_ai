<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI 뉴스레터{% endblock %}</title>
    <meta name="description" content="매일 아침 국내외 주요 AI 뉴스를 자동 수집하여 한국어로 요약 제공">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 상단 정보 바 -->
    <div class="top-bar" aria-label="에디션 정보">
        <div class="container">
            <div class="top-bar-inner">
                <span>AI 뉴스레터</span>
                <span class="top-bar-sep">•</span>
                <span id="topBarDate">매일 오전 7시 발행</span>
                <span class="top-bar-sep">•</span>
                <span>국내외 AI 최신 뉴스</span>
            </div>
        </div>
    </div>

    <!-- 헤더 -->
    <header class="site-header" id="siteHeader" role="banner">
        <div class="container">
            <div class="header-inner">
                <!-- 로고 -->
                <a href="/" class="logo" aria-label="AI 뉴스레터 홈으로 이동">
                    <span class="logo-icon" aria-hidden="true">🤖</span>
                    <span class="logo-title">AI 뉴스레터</span>
                </a>

                <!-- 내비게이션 -->
                <nav class="header-nav" aria-label="주요 메뉴">
                    <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">홈</a>
                    <a href="/news" class="nav-link {% if request.url.path == '/news' %}active{% endif %}">아카이브</a>
                    <a href="/api/articles" class="nav-link" target="_blank" rel="noopener noreferrer">API</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="site-main" id="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- 푸터 -->
    <footer class="site-footer" role="contentinfo">
        <div class="container">
            <div class="footer-inner">
                <p class="footer-text">
                    AI 뉴스레터 &mdash; 매일 오전 7시 자동 수집
                </p>
                <div class="footer-actions">
                    <form action="/api/collect" method="post" class="collect-form" id="collectForm">
                        <button type="submit" class="btn btn-outline btn-sm" id="collectBtn" aria-label="뉴스 수집 시작">
                            <span class="btn-spinner" aria-hidden="true"></span>
                            <span class="btn-label">지금 수집하기</span>
                        </button>
                    </form>
                    <a href="/health" class="footer-link" target="_blank" rel="noopener noreferrer">서버 상태</a>
                    <a href="/api/stats" class="footer-link" target="_blank" rel="noopener noreferrer">통계</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- 로딩 오버레이 -->
    <div class="loading-overlay" id="loadingOverlay" role="status" aria-live="polite" aria-label="수집 진행 중">
        <div class="loading-spinner-large" aria-hidden="true"></div>
        <div class="loading-content">
            <div class="loading-icon" id="loadingIcon" aria-hidden="true">📡</div>
            <p class="loading-message" id="loadingMessage">뉴스를 수집하는 중...</p>
            <p class="loading-submessage">잠시만 기다려 주세요 (최대 10분 소요)</p>
            <div class="loading-dots" aria-hidden="true">
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 컨테이너 -->
    <div class="toast-container" id="toastContainer" aria-live="polite" aria-label="알림"></div>

    <script>
        /* ──────────────────────────────────────────
           상단 바 날짜 (동적)
        ────────────────────────────────────────── */
        (function initTopBarDate() {
            var el = document.getElementById('topBarDate');
            if (el) {
                var now = new Date();
                var opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
                el.textContent = now.toLocaleDateString('ko-KR', opts);
            }
        })();

        /* ──────────────────────────────────────────
           헤더 스크롤 그림자
        ────────────────────────────────────────── */
        (function initScrollShadow() {
            var header = document.getElementById('siteHeader');
            if (!header) return;
            window.addEventListener('scroll', function() {
                if (window.scrollY > 8) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            }, { passive: true });
        })();

        /* ──────────────────────────────────────────
           HTML 이스케이프 (전역)
        ────────────────────────────────────────── */
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        /* ──────────────────────────────────────────
           토스트 알림 시스템
        ────────────────────────────────────────── */
        var toastTimers = {};

        function showToast(opts) {
            /*
             * opts = {
             *   type: 'success' | 'error' | 'info' | 'warning',
             *   title: string,
             *   message: string,
             *   duration: number (ms, 기본 4500)
             * }
             */
            var icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            var type     = opts.type     || 'info';
            var duration = opts.duration != null ? opts.duration : 4500;

            var toastId = 'toast-' + Date.now();
            var icon    = icons[type] || icons.info;

            var toast = document.createElement('div');
            toast.className  = 'toast toast-' + type;
            toast.id         = toastId;
            toast.setAttribute('role', 'alert');
            toast.innerHTML  =
                '<span class="toast-icon" aria-hidden="true">' + icon + '</span>' +
                '<div class="toast-body">' +
                    '<p class="toast-title">' + escapeHtml(opts.title || '') + '</p>' +
                    '<p class="toast-msg">'   + escapeHtml(opts.message || '') + '</p>' +
                '</div>' +
                '<button class="toast-close" aria-label="알림 닫기" onclick="closeToast(\'' + toastId + '\')">&times;</button>';

            document.getElementById('toastContainer').appendChild(toast);

            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    toast.classList.add('show');
                });
            });

            if (duration > 0) {
                toastTimers[toastId] = setTimeout(function() {
                    closeToast(toastId);
                }, duration);
            }

            return toastId;
        }

        function closeToast(id) {
            var el = document.getElementById(id);
            if (!el) return;
            clearTimeout(toastTimers[id]);
            el.classList.remove('show');
            el.classList.add('hide');
            setTimeout(function() { el.remove(); }, 350);
        }

        /* ──────────────────────────────────────────
           로딩 오버레이 + 메시지 순환
        ────────────────────────────────────────── */
        var loadingInterval = null;

        var LOADING_STEPS = [
            { icon: '📡', msg: '뉴스를 수집하는 중...' },
            { icon: '🔍', msg: '기사를 분석하는 중...' },
            { icon: '🤖', msg: 'AI가 요약하는 중...' },
            { icon: '💾', msg: 'DB에 저장하는 중...' },
            { icon: '✨', msg: '거의 다 됐어요...' }
        ];

        function showLoadingOverlay() {
            var overlay = document.getElementById('loadingOverlay');
            var msgEl   = document.getElementById('loadingMessage');
            var iconEl  = document.getElementById('loadingIcon');

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            var step = 0;
            if (iconEl) iconEl.textContent = LOADING_STEPS[0].icon;
            if (msgEl)  msgEl.textContent  = LOADING_STEPS[0].msg;

            loadingInterval = setInterval(function() {
                step = (step + 1) % LOADING_STEPS.length;
                if (iconEl) iconEl.textContent = LOADING_STEPS[step].icon;
                if (msgEl) {
                    msgEl.style.opacity = '0';
                    setTimeout(function() {
                        msgEl.textContent  = LOADING_STEPS[step].msg;
                        msgEl.style.opacity = '1';
                    }, 200);
                }
            }, 2200);
        }

        function hideLoadingOverlay() {
            clearInterval(loadingInterval);
            loadingInterval = null;
            var overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        /* ──────────────────────────────────────────
           수집 버튼 공통 핸들러
        ────────────────────────────────────────── */
        function handleCollect(btn) {
            btn.disabled = true;
            btn.classList.add('loading');
            var labelEl = btn.querySelector('.btn-label');
            if (labelEl) labelEl.textContent = '수집 중...';

            showLoadingOverlay();

            fetch('/api/collect', { method: 'POST' })
                .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, status: res.status, data: data }; }); })
                .then(function(result) {
                    hideLoadingOverlay();
                    if (result.status === 409) {
                        showToast({ type: 'warning', title: '이미 진행 중', message: '수집이 이미 진행 중입니다. 잠시 후 다시 시도해주세요.' });
                    } else if (result.status === 202 || result.ok) {
                        showToast({
                            type: 'info',
                            title: '수집 시작!',
                            message: result.data.message || '백그라운드에서 수집 중입니다. 잠시 후 새로고침하세요.',
                            duration: 7000
                        });
                        setTimeout(function() { location.reload(); }, 12000);
                    } else {
                        showToast({ type: 'error', title: '수집 오류', message: result.data.detail || '알 수 없는 오류가 발생했습니다.' });
                    }
                })
                .catch(function(err) {
                    hideLoadingOverlay();
                    showToast({ type: 'error', title: '요청 실패', message: err.message });
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.classList.remove('loading');
                    if (labelEl) labelEl.textContent = '지금 수집하기';
                });
        }

        // 푸터 수집 버튼
        var collectForm = document.getElementById('collectForm');
        if (collectForm) {
            collectForm.addEventListener('submit', function(e) {
                e.preventDefault();
                handleCollect(document.getElementById('collectBtn'));
            });
        }

        // 빈 상태 / 기타 수집 버튼에서도 동일 함수 호출
        window.__handleCollect = handleCollect;
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
